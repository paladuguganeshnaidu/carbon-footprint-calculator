name: CI/CD Build & Test Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-level: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run code compilations (Shared, Server, Client)
      run: npm run build

    - name: Run automated test suite (Vitest)
      run: npm run test
